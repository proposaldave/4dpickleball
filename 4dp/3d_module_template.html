<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>4DP · Cinematic 3D Module Template</title>
<meta name="description" content="Reference template for 4DP interactive 3D modules. Pure Three.js via CDN, post-processing bloom, dimension-colored trails, view-for-skill cameras.">
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: var(--4dp-ink); }
  body { font-family: var(--4dp-font-body); color: var(--4dp-text); -webkit-font-smoothing: antialiased; }
  #viewport { position: fixed; inset: 0; z-index: 0; }
  #viewport canvas { display: block; width: 100% !important; height: 100% !important; }

  /* Vignette for cinematic feel */
  #vignette {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(10,22,40,.6) 100%);
  }

  /* Top HUD */
  .hud-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 28px; pointer-events: none;
  }
  .hud-top > * { pointer-events: auto; }
  .brand-pill {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(10,22,40,.72); backdrop-filter: blur(14px);
    border: 1px solid var(--4dp-hairline-s); border-radius: var(--4dp-r-pill);
    padding: 8px 16px; font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--4dp-text-dim);
  }
  .brand-pill .d { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--4dp-drive); }
  .hud-controls { display: flex; gap: 8px; }
  .ctrl-btn {
    background: rgba(10,22,40,.72); backdrop-filter: blur(14px);
    border: 1px solid var(--4dp-hairline-s); border-radius: 10px;
    padding: 9px 16px; font-family: var(--4dp-font-body); font-weight: 700;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--4dp-text); cursor: pointer;
    transition: background .2s var(--4dp-ease), border-color .2s var(--4dp-ease);
  }
  .ctrl-btn:hover { background: rgba(245,243,238,.08); border-color: var(--4dp-hairline-s); }
  .ctrl-btn.active { background: var(--dim, var(--4dp-drop)); color: var(--4dp-ink); border-color: var(--dim, var(--4dp-drop)); }

  /* Center hero — shows on load, fades as you interact */
  .center-hero {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5;
    text-align: center; pointer-events: none; max-width: 820px; padding: 0 24px;
    opacity: 1; transition: opacity 1.2s ease;
  }
  .center-hero.dimmed { opacity: 0; }
  .center-hero .eyebrow {
    display: inline-block; padding: 6px 16px; border-radius: var(--4dp-r-pill);
    background: rgba(10,22,40,.72); border: 1px solid var(--4dp-hairline-s);
    font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    color: var(--4dp-text-dim); margin-bottom: 20px;
  }
  .center-hero h1 {
    font-family: var(--4dp-font-display); font-style: italic; font-weight: 400;
    font-size: clamp(56px, 10vw, 132px); letter-spacing: -2.5px; line-height: .95;
    color: var(--4dp-text); margin: 0;
    text-shadow: 0 2px 32px rgba(0,0,0,.6);
  }
  .center-hero .sub {
    margin-top: 22px; font-size: 17px; color: var(--4dp-text-dim);
    line-height: 1.55; max-width: 540px; margin-left: auto; margin-right: auto;
  }

  /* Bottom shot-switcher */
  .shot-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: center; gap: 12px; padding: 24px 20px 28px;
    pointer-events: none;
  }
  .shot-bar > * { pointer-events: auto; }
  .shot-chip {
    display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
    background: rgba(10,22,40,.78); backdrop-filter: blur(14px);
    border: 1px solid var(--4dp-hairline-s); border-radius: var(--4dp-r-md);
    padding: 14px 22px; min-width: 180px;
    cursor: pointer; transition: all .25s var(--4dp-ease);
    position: relative;
  }
  .shot-chip:hover { transform: translateY(-3px); border-color: var(--dim); }
  .shot-chip.active {
    background: color-mix(in srgb, var(--dim) 16%, rgba(10,22,40,.88));
    border-color: var(--dim);
    box-shadow: var(--dim-glow);
  }
  .shot-chip .num {
    font-family: var(--4dp-font-data); font-weight: 700; font-size: 10px;
    letter-spacing: 2px; color: var(--dim); text-transform: uppercase;
  }
  .shot-chip .name {
    font-family: var(--4dp-font-display); font-style: italic; font-weight: 400;
    font-size: 22px; letter-spacing: -.5px; line-height: 1; color: var(--4dp-text);
  }
  .shot-chip .coach { display: none; }
  @media (max-width: 760px) {
    .shot-bar { flex-wrap: wrap; gap: 8px; padding: 16px 12px 20px; }
    .shot-chip { min-width: 0; flex: 1 1 40%; padding: 10px 14px; }
    .shot-chip .name { font-size: 18px; }
  }

  /* Side readout — hidden when embedded in the landing page (parent renders its own panel
     beside the iframe via postMessage sync). Kept in DOM so existing JS doesn't break. */
  .side-card { display: none !important; }
  .side-card .label {
    font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--dim); margin-bottom: 10px;
  }
  .side-card .coach-name { display: none; }
  .side-card .coach-role {
    font-family: var(--4dp-font-display); font-style: italic; font-weight: 400;
    font-size: 26px; line-height: 1.1; color: var(--4dp-text); margin-bottom: 14px;
    text-transform: none; letter-spacing: -.3px;
  }
  .side-card .mantra {
    font-size: 14px; color: var(--4dp-text); line-height: 1.5; font-style: italic;
    padding-top: 14px; border-top: 1px solid var(--4dp-hairline);
  }
  .side-card .trajectory {
    margin-top: 14px; font-size: 12px; color: var(--4dp-text-dim); line-height: 1.55;
  }
  @media (max-width: 760px) {
    .side-card { right: 16px; top: auto; bottom: 160px; transform: none; max-width: calc(100% - 32px); }
    .side-card.visible { transform: none; }
  }

  /* Camera hint */
  .cam-hint {
    position: fixed; bottom: 130px; left: 28px; z-index: 10;
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--4dp-text-faint); pointer-events: none;
    opacity: 1; transition: opacity 1s ease;
  }
  .cam-hint.hidden { opacity: 0; }

  /* Slow-mo indicator */
  .slowmo-badge {
    position: fixed; top: 86px; left: 50%; transform: translateX(-50%); z-index: 10;
    padding: 6px 18px; border-radius: var(--4dp-r-pill);
    background: color-mix(in srgb, var(--4dp-defend) 18%, rgba(10,22,40,.88));
    border: 1px solid color-mix(in srgb, var(--4dp-defend) 50%, transparent);
    font-size: 10px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--4dp-defend);
    opacity: 0; transition: opacity .3s ease; pointer-events: none;
  }
  .slowmo-badge.on { opacity: 1; }

  /* Pause indicator — glass pill at top-center, mirrors slow-mo styling */
  .pause-badge {
    position: fixed; top: 86px; left: 50%; transform: translateX(-50%); z-index: 10;
    padding: 6px 18px; border-radius: var(--4dp-r-pill);
    background: rgba(10,22,40,.88);
    border: 1px solid rgba(245,243,238,.22);
    font-size: 10px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--4dp-text);
    opacity: 0; transition: opacity .3s ease; pointer-events: none;
  }
  .pause-badge.on { opacity: 1; }
  html.embedded .pause-badge { top: 18px; }
  /* When both slow-mo and pause are on, offset pause below */
  .slowmo-badge.on ~ .pause-badge.on { top: 124px; }

  /* Embedded mode — the landing page renders its own shot chips + info panel
     outside the iframe so they don't overlay the 3D scene. Hide the internal
     overlays when the iframe is loaded with ?embedded=1.
     Class is set on <html> synchronously (inline script at top of body) so the
     hide takes effect BEFORE the shot-bar ever renders, no flash. */
  html.embedded .shot-bar,
  html.embedded .cam-hint,
  html.embedded .hud-top,
  body.embedded .shot-bar,
  body.embedded .cam-hint,
  body.embedded .hud-top {
    display: none !important;
    visibility: hidden !important;
    pointer-events: none !important;
  }

  /* Loading */
  #loading {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--4dp-ink); color: var(--4dp-text);
    font-family: var(--4dp-font-display); font-style: italic; font-size: 32px; letter-spacing: -.5px;
    transition: opacity .8s ease;
  }
  #loading.gone { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<!-- Embedded-mode detection runs BEFORE the module so the internal overlays
     (shot-bar, cam-hint, hud-top) are hidden instantly with no flash. -->
<script>
(function(){
  try {
    var p = new URLSearchParams(location.search);
    if (p.get('embedded') === '1') {
      document.documentElement.classList.add('embedded');
    }
  } catch(e){}
})();
</script>

<div id="loading">Loading the court…</div>

<div id="viewport"></div>
<div id="vignette"></div>

<div class="hud-top">
  <span class="brand-pill"><span class="d" id="brand-dot"></span> <span id="brand-label" style="color:#F472B6;font-weight:800;letter-spacing:2px">1D</span></span>
  <div class="hud-controls">
    <button class="ctrl-btn" id="btn-camera">Camera</button>
    <button class="ctrl-btn" id="btn-slowmo">Slow-Mo</button>
    <button class="ctrl-btn" id="btn-pause" title="Space">Pause</button>
    <button class="ctrl-btn" id="btn-replay">Replay</button>
  </div>
</div>

<!-- Center hero removed — 'Anyone can learn 4D Pickleball.' lives on the landing page only, not overlaid on the 3D animation. Keeping an empty placeholder node so the startShot() code that adds .dimmed class doesn't null-deref. -->
<div class="center-hero dimmed" id="center-hero" aria-hidden="true" style="display:none"></div>

<div class="slowmo-badge" id="slowmo-badge">◉ Slow-Mo</div>
<div class="pause-badge" id="pause-badge">⏸ Paused · Press Space</div>

<div class="cam-hint" id="cam-hint">Click + drag to orbit · Scroll to zoom</div>

<div class="side-card" id="side-card">
  <div class="label" id="side-label">Shot 3 · Drop</div>
  <div class="coach-role" id="side-role">Under the ball drop</div>
  <div class="mantra" id="side-mantra">"Let the ball come to you. The reset isn't a shot — it's a pause button."</div>
  <div class="trajectory" id="side-traj">Apex ≈ 8 ft · Lands soft inside the kitchen from the transition zone.</div>
</div>

<div class="shot-bar">
  <button class="shot-chip dim-drive active" data-shot="drive">
    <span class="num">1D · Drive</span>
    <span class="name">Ball Striking</span>
  </button>
  <button class="shot-chip dim-defend" data-shot="defend">
    <span class="num">2D · Defend</span>
    <span class="name">Baby Block</span>
  </button>
  <button class="shot-chip dim-drop" data-shot="drop">
    <span class="num">3D · Drop</span>
    <span class="name">Under the Ball Drop</span>
  </button>
  <button class="shot-chip dim-dink" data-shot="dink">
    <span class="num">4D · Dink</span>
    <span class="name">Kitchen Offense</span>
  </button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }    from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════
// 4DP CINEMATIC TEMPLATE
// Court units: 1 unit = 1 foot.
// Court is 20 ft wide × 44 ft long. Kitchen 7 ft from net.
// Y is up.
// ═══════════════════════════════════════════════════════════

// ── Dimension map (coach, color, view-for-skill camera, mantra) ──
const SHOTS = {
  drive: {
    label: '1D · Drive',
    dim: 'drive',
    color: 0xF472B6,
    role: 'Ball striking',
    mantra: '"Four friends on a court. Everyone at the baseline. Playing tennis."',
    traj: 'Short point. Someone misses. This is where most players start.',
    cam: { pos: [36, 20, 0], look: [0, 3, 0] },
    shot: {
      segments: [
        // 1ST HIT — SERVE: farRight underhand from 2ft behind baseline → bounces in near court
        { from: [ 5, 2.0, -22], to: [-3, 0.15, 15], apex: 7.5, dur: 0.85 },
        // BOUNCE → nearLeft paddle (receiver at baseline, groundstroke height)
        { from: [-3, 0.15, 15], to: [-5, 3, 20], apex: 3.2, dur: 0.40 },
        // 2ND HIT — RETURN: nearLeft groundstroke → bounces in far court
        { from: [-5, 3, 20], to: [ 3, 0.15, -15], apex: 7.5, dur: 0.80 },
        // BOUNCE → farRight paddle
        { from: [ 3, 0.15, -15], to: [ 5, 3, -20], apex: 3.2, dur: 0.40 },
        // 3RD HIT: farRight groundstrokes back → bounces in near court
        { from: [ 5, 3, -20], to: [-4, 0.15, 16], apex: 7.0, dur: 0.75 },
        // BOUNCE → nearLeft paddle
        { from: [-4, 0.15, 16], to: [-5, 3, 20], apex: 3.0, dur: 0.40 },
        // 4TH HIT: nearLeft groundstrokes → bounces center-right in far court
        { from: [-5, 3, 20], to: [ 2, 0.15, -14], apex: 7.0, dur: 0.75 },
        // BOUNCE → farRight paddle
        { from: [ 2, 0.15, -14], to: [ 5, 3, -20], apex: 3.0, dur: 0.40 },
        // 5TH HIT: farRight down the middle → bounces in near center court
        { from: [ 5, 3, -20], to: [-2, 0.15, 14], apex: 6.8, dur: 0.75 },
        // BOUNCE → nearLeft paddle
        { from: [-2, 0.15, 14], to: [-5, 3, 20], apex: 3.0, dur: 0.40 },
        // 6TH HIT: nearLeft cross-court → bounces in far court
        { from: [-5, 3, 20], to: [ 3, 0.15, -13], apex: 6.8, dur: 0.75 },
        // BOUNCE → farRight paddle (ball dragging farRight sideways)
        { from: [ 3, 0.15, -13], to: [ 5, 3, -20], apex: 3.0, dur: 0.40 },
        // 7TH HIT — SHANK: farRight off-balance mishit → dies just past the net (the 1D error)
        { from: [ 5, 3, -20], to: [ 0, 0.3, 3], apex: 4.5, dur: 0.95 }
      ]
    },
    // ── 1D player movement — "four tennis players who don't know pickleball yet"
    // Server (farRight) and partner (farLeft) behind baseline. Receiver (nearLeft) at
    // baseline. Receiver's partner (nearRight) AT KITCHEN LINE — one player at the line
    // per standard positioning. The 1D error: receiver NEVER advances to join their
    // partner at the kitchen; they stay split backcourt/frontcourt the entire rally.
    // All shots bounce (groundstrokes). Lateral sliding only — no z-forward motion.
    playerFrames: [
      // F0 — pre-serve (standard positioning: server team behind, receiver at baseline,
      //       receiver's partner at kitchen line)
      { nearLeft:[-5,20],    nearRight:[5,8],   farLeft:[-5,-22],   farRight:[5,-22] },
      // F1 — serve bouncing in near court (servers STAY behind baseline)
      { nearLeft:[-5,20],    nearRight:[5,8],   farLeft:[-5,-22],   farRight:[5,-22] },
      // F2 — nearLeft returns; servers still behind (1D error: receiver doesn't advance)
      { nearLeft:[-5,20],    nearRight:[5,8],   farLeft:[-4.5,-22], farRight:[5,-22] },
      // F3 — return bouncing in far court
      { nearLeft:[-4.5,20],  nearRight:[5,8],   farLeft:[-4,-22],   farRight:[5,-22] },
      // F4 — farRight hits 3rd shot
      { nearLeft:[-5,20],    nearRight:[5,8],   farLeft:[-4,-22],   farRight:[5,-22] },
      // F5 — 3rd bouncing in near court (lateral tracking)
      { nearLeft:[-5,20],    nearRight:[5,8],   farLeft:[-4,-22],   farRight:[4.5,-22] },
      // F6 — nearLeft hits 4th shot
      { nearLeft:[-5,20],    nearRight:[5,8],   farLeft:[-4,-22],   farRight:[4,-22] },
      // F7 — 4th bouncing in far court (farRight tracking to his forehand)
      { nearLeft:[-4.5,20],  nearRight:[5,8],   farLeft:[-5,-22],   farRight:[4,-22] },
      // F8 — farRight hits 5th shot
      { nearLeft:[-5,20],    nearRight:[5,8],   farLeft:[-5,-22],   farRight:[4,-22] },
      // F9 — 5th bouncing in near court, center
      { nearLeft:[-4,20],    nearRight:[5,8],   farLeft:[-5,-22],   farRight:[4.5,-22] },
      // F10 — nearLeft hits 6th shot
      { nearLeft:[-4,20],    nearRight:[5,8],   farLeft:[-5,-22],   farRight:[5,-22] },
      // F11 — 6th bouncing in far court (farRight pulled wide)
      { nearLeft:[-4,20],    nearRight:[5,8],   farLeft:[-5,-22],   farRight:[4.5,-22] },
      // F12 — farRight stretches for the ball, OFF-BALANCE — the shank
      { nearLeft:[-4,20],    nearRight:[5,8],   farLeft:[-5,-22],   farRight:[3.5,-22.5] },
      // F13 — after shank dies short (farRight recovered; nearRight still at kitchen watching)
      { nearLeft:[-4,20],    nearRight:[5,8],   farLeft:[-5,-22],   farRight:[3,-22] }
    ]
  },
  defend: {
    label: '2D · Defend',
    dim: 'defend',
    color: 0xFBBF24,
    role: 'Baby block',
    mantra: '"One team wakes up. Someone advances. Someone learns the baby block."',
    traj: 'Point extends. The attack doesn\'t end it — the block neutralizes and the rally sustains.',
    cam: { pos: [36, 22, 4], look: [0, 3, 0] },
    shot: {
      segments: [
        // SERVE: farRight underhand from 2ft behind baseline
        { from: [ 5, 2.0, -22], to: [-5, 3, 20], apex: 8.0, dur: 1.1 },
        // RETURN: near returns to far baseline
        { from: [-5, 3, 20], to: [ 5, 3, -20], apex: 8.0, dur: 1.1 },
        // THIRD SHOT DRIVE: far drives from baseline, lands AT near kitchen line (not transition)
        { from: [ 5, 3, -20], to: [-3, 1.5, 8], apex: 2.8, dur: 0.85 },
        // BABY BLOCK: near redirects from KITCHEN LINE — soft short ball into far transition zone
        { from: [-3, 1.5, 8], to: [ 0, 0.8, -12], apex: 2.2, dur: 0.85 },
        // Ball dies in front of far team — they can't reach from baseline
        { from: [ 0, 0.8, -12], to: [ 2, 0.15, -16], apex: 1.2, dur: 0.65 }
      ]
    },
    // ── 2D player movement — receiver's partner starts at KITCHEN LINE (standard
    // pickleball positioning — exactly one player at the line at start). Receiver
    // (nearLeft) advances to kitchen after their return. Serving team STAYS BEHIND
    // BASELINE the entire rally — that's why they lose the point.
    // Kitchen-line position = z=±8 so player bodies never cross into the kitchen.
    playerFrames: [
      // F0 — pre-serve (exactly one at kitchen line: nearRight)
      { nearLeft:[-5,20],   nearRight:[5,8],    farLeft:[-5,-22],   farRight:[5,-22] },
      // F1 — after serve (serving team STAYS behind baseline; receiver still at baseline)
      { nearLeft:[-5,20],   nearRight:[5,8],    farLeft:[-5,-22],   farRight:[5,-22] },
      // F2 — after return, receiver SPRINTED to join partner at kitchen line
      { nearLeft:[-5,8],    nearRight:[5,8],    farLeft:[-5,-22],   farRight:[5,-22] },
      // F3 — drive arrived at kitchen line (near AT kitchen; far still behind)
      { nearLeft:[-3,8],    nearRight:[5,8],    farLeft:[-5,-22],   farRight:[5,-22] },
      // F4 — after baby block (near STAYS at kitchen; far slid laterally, still behind)
      { nearLeft:[-3,8],    nearRight:[5,8],    farLeft:[-4,-22],   farRight:[3,-22] },
      // F5 — ball dies in far transition zone (near STILL at kitchen; far caught back)
      { nearLeft:[-3,8],    nearRight:[5,8],    farLeft:[-3,-22],   farRight:[3,-22] }
    ]
  },
  drop: {
    label: '3D · Drop',
    dim: 'drop',
    color: 0x34D399,
    role: 'Under the ball drop',
    mantra: '"Now the far team adds the drop. The rally stretches."',
    traj: 'High arc from the transition zone — bounces in front of the kitchen-line team. Point keeps going.',
    cam: { pos: [38, 22, 0], look: [0, 4, 0] },
    shot: {
      segments: [
        // SERVE: farRight underhand from 2ft behind baseline
        { from: [ 5, 2.0, -22], to: [-5, 3, 20], apex: 8.0, dur: 1.0 },
        // RETURN: near returns
        { from: [-5, 3, 20], to: [ 5, 3, -20], apex: 8.0, dur: 1.0 },
        // THIRD SHOT DRIVE: from far baseline, lands AT near kitchen line
        { from: [ 5, 3, -20], to: [-3, 1.5, 8], apex: 2.8, dur: 0.80 },
        // BABY BLOCK from kitchen line — soft into far TRANSITION ZONE (not inside kitchen)
        { from: [-3, 1.5, 8], to: [ 0, 0.8, -13], apex: 2.2, dur: 0.80 },
        // UNDER-BALL DROP from far transition zone — high soft arc, lands in near kitchen
        { from: [ 0, 0.8, -13], to: [ 0, 1.0, 5], apex: 6.5, dur: 1.10 },
        // Near team dinks cross-court (lets drop bounce, dinks it over far kitchen)
        { from: [ 0, 1.0, 5], to: [ 3, 1.0, -5], apex: 2.5, dur: 0.80 },
        // Far team reaches but ball dies just past kitchen line
        { from: [ 3, 1.0, -5], to: [-2, 0.3, -9], apex: 1.6, dur: 0.65 }
      ]
    },
    // ── 3D player movement — Dave's canonical sequence:
    //   F0. Receiver's partner (nearRight) at kitchen line; receiver at baseline;
    //       serving team behind baseline
    //   F1. Serve → serving team STAYS EXACTLY where they are
    //   F2. After return → receiver SPRINTED to kitchen line (now both at line)
    //   F3. Third shot drive → serving team still behind baseline (hit the drive with
    //       paddle reaching forward); near team now AT kitchen line
    //   F4. After baby block → serving team moves in JUST A LITTLE BIT to transition
    //   F5. After drop from transition → serving team crept slightly forward
    //   F6. After near's cross-court dink → serving team finally reaches kitchen line
    //   F7. Ball dies (serving team couldn't cleanly return)
    // Kitchen-line position = z=±8 so player bodies never cross into the kitchen.
    playerFrames: [

// Outside deck — slate gray with gradient via canvas texture
function makeDeckTexture() {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, 512);
  g.addColorStop(0, '#5E6878');
  g.addColorStop(1, '#4A5462');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 512, 512);
  // Subtle noise for texture
  for (let i = 0; i < 2000; i++) {
    ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.06})`;
    ctx.fillRect(Math.random() * 512, Math.random() * 512, 1, 1);
  }
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const deckGeo = new THREE.PlaneGeometry(COURT_W + 18, COURT_L + 18);
const deckMat = new THREE.MeshStandardMaterial({
  map: makeDeckTexture(), roughness: 0.88, metalness: 0.02
});

// Playing surface — radial gradient blue (bright center → deeper edges)
function makeCourtTexture() {
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 1024;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(512, 512, 40, 512, 512, 680);
  g.addColorStop(0, '#2D5FA8');
  g.addColorStop(0.7, '#234E8C');
  g.addColorStop(1, '#1B3E72');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 1024, 1024);
  // Vignette inset shadow to mimic reference court's embossed feel
  const v = ctx.createRadialGradient(512, 512, 300, 512, 512, 720);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = v; ctx.fillRect(0, 0, 1024, 1024);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const surfaceGeo = new THREE.PlaneGeometry(COURT_W, COURT_L);
const surfaceMat = new THREE.MeshStandardMaterial({

function makeKitchenTexture() {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, 256);
  g.addColorStop(0, '#6B0F1A');
  g.addColorStop(1, '#52090F');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 512, 256);
  // Inner glow from bottom
  const glow = ctx.createRadialGradient(256, 128, 20, 256, 128, 260);
  glow.addColorStop(0, 'rgba(255,61,90,0.14)');
  glow.addColorStop(1, 'rgba(255,61,90,0)');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, 512, 256);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const kitchenMat = new THREE.MeshStandardMaterial({

// ═══════════════════════════════════════════════════════════
// PLAYERS — right-handed pickleball players in ready stance
// Primitives for v1 (R18 stack lock). Jersey + shorts + arms +
// paddle in the right hand, held forward at chest height.
// Rotate group so the "right hand" is always on the player's
// actual right side, no matter which way they face the net.
// ═══════════════════════════════════════════════════════════
function makePlayer({ jersey, shorts, z, x = 0, facing }) {
  // facing: +1 = faces +z, -1 = faces -z (rotate whole group)
  const g = new THREE.Group();

  const skin = new THREE.MeshStandardMaterial({ color: 0xE7B48C, roughness: 0.7 });
  const shortMat = new THREE.MeshStandardMaterial({ color: shorts, roughness: 0.7, metalness: 0.05 });
  const jerseyMat = new THREE.MeshStandardMaterial({ color: jersey, roughness: 0.55, metalness: 0.1 });
  const paddleFaceMat = new THREE.MeshStandardMaterial({ color: 0x8B1A2B, roughness: 0.35, metalness: 0.25 });
  const paddleEdgeMat = new THREE.MeshStandardMaterial({ color: 0x0A1628, roughness: 0.3, metalness: 0.55 });
  const gripMat = new THREE.MeshStandardMaterial({ color: 0x1A1F2E, roughness: 0.85 });
  const shoeMat  = new THREE.MeshStandardMaterial({ color: 0xF5F3EE, roughness: 0.5 });

  // Legs (athletic ready stance — slightly apart)
  for (const sign of [-1, 1]) {
    const leg = new THREE.Mesh(new THREE.CapsuleGeometry(0.22, 1.1, 6, 10), shortMat);
    leg.position.set(sign * 0.28, 0.9, 0);
    leg.castShadow = true;
    g.add(leg);
    // Shoe
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.22, 0.9), shoeMat);
    shoe.position.set(sign * 0.28, 0.14, 0.12);
    shoe.castShadow = true;
    g.add(shoe);
  }

  // Shorts block (connects the legs visually)
  const shortsBlock = new THREE.Mesh(new THREE.CapsuleGeometry(0.52, 0.28, 6, 10), shortMat);
  shortsBlock.position.y = 1.7;
  shortsBlock.castShadow = true;
  g.add(shortsBlock);

  // Torso (jersey)
  const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.55, 1.1, 8, 14), jerseyMat);
  torso.position.y = 2.55;
  torso.castShadow = true;
  g.add(torso);

  // Neck + head
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.24, 0.28, 12), skin);
  neck.position.y = 3.3;
  neck.castShadow = true;
  g.add(neck);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.42, 24, 16), skin);
  head.position.y = 3.75;
  head.castShadow = true;
  g.add(head);
  // Simple cap (brim suggests athletic gear)
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.44, 24, 12, 0, Math.PI * 2, 0, Math.PI / 2), jerseyMat);
  cap.position.y = 3.82;
  cap.scale.y = 0.6;
  cap.castShadow = true;
  g.add(cap);

  // LEFT arm (non-paddle hand) — hangs ready at side
  const leftArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.14, 0.9, 5, 8), jerseyMat);
  leftArm.position.set(-0.62, 2.55, 0.1);
  leftArm.rotation.z = 0.18;
  leftArm.castShadow = true;
  g.add(leftArm);
  const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.14, 12, 8), skin);
  leftHand.position.set(-0.72, 1.95, 0.12);
  leftHand.castShadow = true;
  g.add(leftHand);

  // RIGHT arm — bent forward at elbow, paddle held up in ready position
  // Upper arm
  const upperArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.15, 0.7, 5, 8), jerseyMat);
  upperArm.position.set(0.58, 2.62, 0.25);
  upperArm.rotation.z = 0.22;
  upperArm.rotation.x = 0.4;
  upperArm.castShadow = true;
  g.add(upperArm);
  // Forearm (angled forward toward net)
  const forearm = new THREE.Mesh(new THREE.CapsuleGeometry(0.13, 0.7, 5, 8), skin);
  forearm.position.set(0.68, 2.35, 0.95);
  forearm.rotation.x = Math.PI / 2 - 0.25;
  forearm.castShadow = true;
  g.add(forearm);

  // PADDLE in right hand — grip → edge → face (proper pickleball paddle proportions)
  const paddleGroup = new THREE.Group();
  // Grip (handle)
  const grip = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.085, 0.5, 12), gripMat);
  grip.position.y = -0.7;
  grip.castShadow = true;
  paddleGroup.add(grip);
  // Throat (transition from grip to face)
  const throat = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.08, 0.12, 8), paddleEdgeMat);
  throat.position.y = -0.38;
  paddleGroup.add(throat);
  // Paddle face — elongated oval via scaled box (~7.5" wide × 16" tall total)
  const face = new THREE.Mesh(new THREE.BoxGeometry(0.62, 1.1, 0.06), paddleFaceMat);
  face.position.y = 0.22;
  face.castShadow = true;
  paddleGroup.add(face);
  // Bevel / edge guard
  const edge = new THREE.Mesh(new THREE.BoxGeometry(0.66, 1.14, 0.04), paddleEdgeMat);
  edge.position.y = 0.22;
  edge.position.z = -0.01;
  paddleGroup.add(edge);
  // 4DP logo dot on the face
  const paddleLogo = new THREE.Mesh(
    new THREE.CircleGeometry(0.08, 16),
    new THREE.MeshStandardMaterial({ color: 0xF5F3EE, emissive: 0xF5F3EE, emissiveIntensity: 0.2 })
  );
  paddleLogo.position.set(0, 0.22, 0.032);
  paddleGroup.add(paddleLogo);

  // Position paddle at the end of the forearm, face pointing toward net (forward)
  paddleGroup.position.set(0.72, 2.9, 1.55);
  paddleGroup.rotation.x = -0.4;
  paddleGroup.rotation.z = 0.15;
  g.add(paddleGroup);

  // Slight athletic forward lean
  g.rotation.x = -0.05;

  g.position.set(x, 0, z);
  // Rotate whole player so right-hand always stays on player's actual right
  if (facing === -1) g.rotation.y = Math.PI;

  // Expose paddle for swing animation (updatePaddleAnimation animates rotation during hits)
  g.userData.paddle = paddleGroup;
  g.userData.paddleDefault = { rx: -0.4, rz: 0.15 };
  return g;
}
// Four players at baseline corners — the "4 friends on a court" frame
// Far team (far baseline, facing near team)
const playerFarLeft   = makePlayer({ jersey: 0x1B4079, shorts: 0x0F2138, z: -20, x: -5, facing: +1 });

// Near team (near baseline, facing far team)

const playerNearRight = makePlayer({ jersey: 0x8B1A2B, shorts: 0x0F2138, z:  20, x:  5, facing: -1 });

// ═══════════════════════════════════════════════════════════
// PLAYER MOVEMENT SYSTEM
// Each SHOTS[key].playerFrames is an array of keyframes, one per segment
// boundary (length = segments.length + 1). Each frame maps playerKey → [x,z].
// During a segment, each player tweens from frame[idx] → frame[idx+1] with
// easeInOutCubic on the segment's local t.
// Facing is NOT changed — players keep facing the net while sliding.
// ═══════════════════════════════════════════════════════════
const players = {
  nearLeft:  playerNearLeft,
  nearRight: playerNearRight,
  farLeft:   playerFarLeft,
  farRight:  playerFarRight
};
const PLAYER_KEYS = ['nearLeft', 'nearRight', 'farLeft', 'farRight'];
const INITIAL_POS = {
  nearLeft:  [-5,  20], nearRight: [ 5,  20],
  farLeft:   [-5, -20], farRight:  [ 5, -20]
};

function getSegmentInfo(shot, t) {
  if (!shot.segments) return null;
  const totalDur = shot.segments.reduce((a, s) => a + s.dur, 0);
  const timeT = t * totalDur;
  let acc = 0;
  for (let i = 0; i < shot.segments.length; i++) {
    const seg = shot.segments[i];
    if (timeT <= acc + seg.dur || i === shot.segments.length - 1) {
      const localT = Math.min(1, Math.max(0, (timeT - acc) / seg.dur));
      return { idx: i, localT };
    }
    acc += seg.dur;
  }
  return { idx: shot.segments.length - 1, localT: 1 };
}

function updatePlayerPositions(dimKey, t) {
  const dim = SHOTS[dimKey];
  if (!dim.playerFrames) return;
  const info = getSegmentInfo(dim.shot, t);
  if (!info) return;
  const startFrame = dim.playerFrames[info.idx]     || {};
  const endFrame   = dim.playerFrames[info.idx + 1] || startFrame;
  // easeInOutCubic
  const lt = info.localT;
  const e = lt < 0.5 ? 4 * lt * lt * lt : 1 - Math.pow(-2 * lt + 2, 3) / 2;
  for (const k of PLAYER_KEYS) {
    const from = startFrame[k] || INITIAL_POS[k];
    const to   = endFrame[k]   || from;
    const x = from[0] + (to[0] - from[0]) * e;
    const z = from[1] + (to[1] - from[1]) * e;
    players[k].position.set(x, 0, z);
  }
}

function resetPlayerPositions(dimKey) {
  const dim = SHOTS[dimKey];
  const f0 = (dim.playerFrames && dim.playerFrames[0]) || {};
  for (const k of PLAYER_KEYS) {
    const pos = f0[k] || INITIAL_POS[k];
    players[k].position.set(pos[0], 0, pos[1]);
  }
  // Reset all paddles to ready position (cleared between shots)
  for (const k of PLAYER_KEYS) {
    const paddle = players[k].userData.paddle;
    const def = players[k].userData.paddleDefault;
    if (paddle && def) { paddle.rotation.x = def.rx; paddle.rotation.z = def.rz; }
  }
}

// Given a segment index, find which player HIT the ball at the start of that segment.
// Ball-launching segments start at paddle height (y ≥ 1.5); bounce segments start at
// ground level and have no hitter. Hitter = nearest player to the segment's from point.
function getSegmentHitter(dimKey, segIdx) {
  const dim = SHOTS[dimKey];
  const segs = dim.shot && dim.shot.segments;
  if (!segs || !dim.playerFrames) return null;
  const seg = segs[segIdx];
  if (!seg || !seg.from) return null;
  if (seg.from[1] < 1.5) return null;   // bounce segment — ball starts on ground
  const frame = dim.playerFrames[segIdx] || dim.playerFrames[0];
  if (!frame) return null;
  let minD2 = Infinity, hitter = null;
  for (const k of PLAYER_KEYS) {
    const p = frame[k] || INITIAL_POS[k];
    const dx = p[0] - seg.from[0];
    const dz = p[1] - seg.from[2];
    const d2 = dx*dx + dz*dz;
    if (d2 < minD2) { minD2 = d2; hitter = k; }
  }
  if (minD2 > 64) return null;  // 8ft = too far, probably a dead ball
  return hitter;
}

// Paddle swing — rotates the hitter's paddle through a forward swing arc during the
// first ~18% of each ball-launching segment (the contact + follow-through window).
// All other paddles reset to ready position every frame.
function updatePaddleAnimation(dimKey, shotT) {
  // Reset everyone to ready
  for (const k of PLAYER_KEYS) {
    const paddle = players[k].userData.paddle;
    const def = players[k].userData.paddleDefault;
    if (paddle && def) { paddle.rotation.x = def.rx; paddle.rotation.z = def.rz; }
  }
  const dim = SHOTS[dimKey];
  if (!dim.shot || !dim.shot.segments) return;
  const info = getSegmentInfo(dim.shot, shotT);
  if (!info) return;
  const SWING_WINDOW = 0.18;
  if (info.localT > SWING_WINDOW) return;
  const hitter = getSegmentHitter(dimKey, info.idx);
  if (!hitter) return;
  const paddle = players[hitter].userData.paddle;
  const def = players[hitter].userData.paddleDefault;
  if (!paddle || !def) return;
  // Sine pulse — 0 → 1 → 0 across the swing window (fast forward, snap back)
  const phase = info.localT / SWING_WINDOW;
  const swing = Math.sin(phase * Math.PI);
  paddle.rotation.x = def.rx - swing * 1.3;   // tilt paddle forward/through
  paddle.rotation.z = def.rz + swing * 0.25;  // slight roll on the swing
}

// ═══════════════════════════════════════════════════════════
// BALL — emissive sphere, dimension-colored (swapped per shot)
// ═══════════════════════════════════════════════════════════
const ballMat = new THREE.MeshStandardMaterial({
  color: 0xFFF4D6, emissive: 0xFFEEAA, emissiveIntensity: 1.8, roughness: 0.5, metalness: 0.1
});
const ball = new THREE.Mesh(new THREE.SphereGeometry(0.24, 20, 14), ballMat);
ball.castShadow = true;
ball.position.set(0, 3, 14);
scene.add(ball);

// Soft point light that follows the ball — adds local glow
const ballLight = new THREE.PointLight(0xFFEEAA, 0.9, 8, 2);
scene.add(ballLight);

// Ball SHADOW on ground — a soft dark ellipse tracking under the ball.
// Scale shrinks and opacity fades as ball rises, so you always know its height.
// This is the #1 cinematic trick to make a bouncing ball feel real in 3D.
const ballShadowMat = new THREE.MeshBasicMaterial({
  color: 0x000000, transparent: true, opacity: 0.32, depthWrite: false
});
const ballShadow = new THREE.Mesh(new THREE.CircleGeometry(0.28, 24), ballShadowMat);
ballShadow.rotation.x = -Math.PI / 2;
ballShadow.position.y = 0.015;  // just above the court surface
scene.add(ballShadow);

// ═══════════════════════════════════════════════════════════
// BALL TRAIL — TubeGeometry rebuilt from CatmullRomCurve3 each frame
// This is the single biggest "oh" moment — dimension color,
// fades over ~0.5s as points drop off the tail.
// ═══════════════════════════════════════════════════════════
const TRAIL_MAX = 64;
let trailPoints = [];
let trailMesh = null;
const trailMat = new THREE.MeshStandardMaterial({
  color: 0x34D399, emissive: 0x34D399, emissiveIntensity: 2.2,
  transparent: true, opacity: 0.85, roughness: 0.2, metalness: 0.0
});

function rebuildTrail() {
  if (trailMesh) { scene.remove(trailMesh); trailMesh.geometry.dispose(); }
  if (trailPoints.length < 4) return;
  const curve = new THREE.CatmullRomCurve3(trailPoints);
  const geo = new THREE.TubeGeometry(curve, Math.min(trailPoints.length * 3, 120), 0.09, 8, false);
  trailMesh = new THREE.Mesh(geo, trailMat);
  scene.add(trailMesh);
}
function setDimensionColor(hex) {
  ballMat.emissive.setHex(hex);
  ballMat.color.setHex(hex).offsetHSL(0, 0, 0.15);
  trailMat.color.setHex(hex);
  trailMat.emissive.setHex(hex);
  ballLight.color.setHex(hex);
}

// ═══════════════════════════════════════════════════════════
// IMPACT BURST — particle pop at contact / landing
// ═══════════════════════════════════════════════════════════
const bursts = [];
function spawnBurst(pos, colorHex) {
  const count = 18;
  const grp = new THREE.Group();
  grp.position.copy(pos);
  for (let i = 0; i < count; i++) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 8, 6),
      new THREE.MeshStandardMaterial({
        color: colorHex, emissive: colorHex, emissiveIntensity: 2.5,
        transparent: true, opacity: 1
      })
    );
    m.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 4,
      Math.random() * 3 + 1,
      (Math.random() - 0.5) * 4
    );
    grp.add(m);
  }
  grp.userData.t = 0;
  scene.add(grp);
  bursts.push(grp);
}
function updateBursts(dt) {
  for (let i = bursts.length - 1; i >= 0; i--) {
    const b = bursts[i];
    b.userData.t += dt;
    b.children.forEach(m => {
      m.position.addScaledVector(m.userData.vel, dt);
      m.userData.vel.y -= 14 * dt; // gravity
      m.material.opacity = Math.max(0, 1 - b.userData.t / 0.8);
    });
    if (b.userData.t > 0.8) {
      b.children.forEach(m => { m.geometry.dispose(); m.material.dispose(); });
      scene.remove(b);
      bursts.splice(i, 1);
    }
  }
}

// ═══════════════════════════════════════════════════════════
// TRAJECTORY — parabola with controllable apex
// Returns ball position at parametric t in [0,1]
// ═══════════════════════════════════════════════════════════
function arcAt(from, to, apex, t) {
  const x = from[0] + (to[0] - from[0]) * t;
  const z = from[2] + (to[2] - from[2]) * t;
  const baseY = from[1] + (to[1] - from[1]) * t;
  const apexOffset = apex - (from[1] + to[1]) / 2;
  const y = baseY + 4 * apexOffset * t * (1 - t);
  return new THREE.Vector3(x, y, z);
}
function trajectoryAt(shot, t) {
  // Multi-segment rally path: walk the segments until we find the one containing t
  if (shot.segments) {
    const totalDur = shot.segments.reduce((a, s) => a + s.dur, 0);
    const timeT = t * totalDur;
    let acc = 0;
    for (const seg of shot.segments) {
      if (timeT <= acc + seg.dur || seg === shot.segments[shot.segments.length - 1]) {
        const localT = Math.min(1, Math.max(0, (timeT - acc) / seg.dur));
        return arcAt(seg.from, seg.to, seg.apex, localT);
      }
      acc += seg.dur;
    }
  }
  // Back-compat: single-arc shot
  return arcAt(shot.from, shot.to, shot.apex, t);
}

// ═══════════════════════════════════════════════════════════
// ANIMATION STATE
// ═══════════════════════════════════════════════════════════
let shotT = 0;
let shotRunning = false;
let shotStart = 0;
let shotBurstFired = false;

function startShot(key, resetCamera = true) {
  activeShotKey = key;
  const s = SHOTS[key];
  setDimensionColor(s.color);
  trailPoints = [];
  if (trailMesh) { scene.remove(trailMesh); trailMesh.geometry.dispose(); trailMesh = null; }
  // Multi-segment shots have from inside segments[0]; single-arc shots have it on shot directly
  const firstFrom = s.shot.segments ? s.shot.segments[0].from : s.shot.from;
  ball.position.set(...firstFrom);
  // Only snap camera to the view-for-skill preset on explicit shot change or Replay.
  // Auto-replay and internal calls preserve whatever camera angle the user dragged to.
  if (resetCamera) {
    animateCameraTo(s.cam.pos, s.cam.look, 1.1);
    camPresetIdx = 0; // reset preset index so next Camera-button press starts from skill-view
  }
  shotT = 0;
  shotStart = performance.now();
  shotRunning = true;
  shotBurstFired = false;
  resetPlayerPositions(key);
  updateSideCard(key);
  updateShotChips(key);
  updateBrandPill(key);
  // Dim the hero overlay on first interaction
  document.getElementById('center-hero').classList.add('dimmed');
}

function updateSideCard(key) {
  const s = SHOTS[key];
  const card = document.getElementById('side-card');
  const hex = '#' + s.color.toString(16).padStart(6, '0');
  card.style.setProperty('--dim', hex);
  document.getElementById('side-label').textContent = s.label;
  document.getElementById('side-role').textContent  = s.role;
  document.getElementById('side-mantra').textContent= s.mantra;
  document.getElementById('side-traj').textContent  = s.traj;
  card.classList.add('visible');
  // Notify the parent landing page so it can render the info beside the iframe instead of on top
  try {
    window.parent.postMessage({
      type: '4dp:shot-changed',
      key, label: s.label, role: s.role, mantra: s.mantra, traj: s.traj, color: hex
    }, '*');
  } catch (e) { /* not embedded in a parent — no-op */ }
}
function updateShotChips(key) {
  document.querySelectorAll('.shot-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.shot === key);
  });
}
function updateBrandPill(key) {
  const s = SHOTS[key];
  const hex = '#' + s.color.toString(16).padStart(6, '0');
  document.getElementById('brand-dot').style.background = hex;
  const dimPrefix = s.label.split(' ')[0];   // "1D" / "2D" / "3D" / "4D"
  const label = document.getElementById('brand-label');
  label.textContent = dimPrefix;
  label.style.color = hex;
}
// Back-compat shim: older code may still call updateBrandDot
function updateBrandDot(hex) {
  document.getElementById('brand-dot').style.background = '#' + hex.toString(16).padStart(6, '0');
}

// ═══════════════════════════════════════════════════════════
// SMOOTH CAMERA TWEEN (cubic ease)
// ═══════════════════════════════════════════════════════════
let camTween = null;
function animateCameraTo(pos, look, duration = 1.0) {
  const startPos = camera.position.clone();
  const startLook = controls.target.clone();
  const endPos = new THREE.Vector3(...pos);
  const endLook = new THREE.Vector3(...look);
  const t0 = performance.now();
  camTween = { startPos, startLook, endPos, endLook, t0, duration: duration * 1000 };
}
function updateCameraTween(now) {
  if (!camTween) return;
  const t = Math.min(1, (now - camTween.t0) / camTween.duration);
  const e = 1 - Math.pow(1 - t, 3); // easeOutCubic
  camera.position.lerpVectors(camTween.startPos, camTween.endPos, e);
  controls.target.lerpVectors(camTween.startLook, camTween.endLook, e);
  if (t >= 1) camTween = null;
}

// ═══════════════════════════════════════════════════════════
// MAIN ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
let lastTime = performance.now();
function animate() {
  const now = performance.now();
  const rawDt = Math.min(0.05, (now - lastTime) / 1000);
  // Auto-slow-mo on cinematic segments (4D pop-up + finish = the hero moment).
  // When paused, dt=0 so the ball + players freeze but the render loop keeps running.
  let autoSlowMo = false;
  if (shotRunning) {
    const dim = SHOTS[activeShotKey];
    if (dim && dim.shot && dim.shot.segments) {
      const info = getSegmentInfo(dim.shot, shotT);
      const seg = info ? dim.shot.segments[info.idx] : null;
      if (seg && seg.cinematic) autoSlowMo = true;
    }
  }
  const speedMult = slowMo ? 0.28 : (autoSlowMo ? 0.42 : 1.0);
  const dt = paused ? 0 : rawDt * speedMult;
  lastTime = now;
  // Badge reflects auto slow-mo too, so viewer knows why playback is slow
  const _sloBadge = document.getElementById('slowmo-badge');
  if (_sloBadge) _sloBadge.classList.toggle('on', slowMo || autoSlowMo);

  controls.update();
  updateCameraTween(now);

  // Advance shot
  if (shotRunning) {
    const s = SHOTS[activeShotKey].shot;
    // Total duration is sum of all segment durations (or legacy single-arc duration)
    const totalDur = s.segments ? s.segments.reduce((a, seg) => a + seg.dur, 0) : s.duration;
    shotT += dt / totalDur;
    if (shotT >= 1) {
      shotT = 1;
      shotRunning = false;
      if (!shotBurstFired) {
        spawnBurst(ball.position.clone(), SHOTS[activeShotKey].color);
        shotBurstFired = true;
        // Auto-replay loop — preserve the user's camera angle (don't snap back to preset)
        setTimeout(() => { if (activeShotKey) startShot(activeShotKey, false); }, 1000);
      }
    }
    const p = trajectoryAt(s, shotT);
    ball.position.copy(p);
    ballLight.position.copy(p);

    // Ball shadow tracks ball in x/z; shrinks + fades with height
    ballShadow.position.x = p.x;
    ballShadow.position.z = p.z;
    const hAboveGround = Math.max(0, p.y - 0.24);
    const shadowScale = Math.max(0.55, 1 - hAboveGround * 0.06);
    ballShadow.scale.setScalar(shadowScale);
    ballShadowMat.opacity = Math.max(0.12, 0.36 - hAboveGround * 0.022);

    // Ball squash near ground — gives bounces physical weight (not a rigid sphere)
    const squash = Math.exp(-hAboveGround * 4);  // 1 at ground, ~0 at y=1
    ball.scale.y = 1 - squash * 0.28;
    ball.scale.x = 1 + squash * 0.14;
    ball.scale.z = 1 + squash * 0.14;

    // Drive the players + paddles off the same shotT — motion stays in sync with ball.
    updatePlayerPositions(activeShotKey, shotT);
    updatePaddleAnimation(activeShotKey, shotT);

    // Add to trail, cap length
    trailPoints.push(p.clone());
    if (trailPoints.length > TRAIL_MAX) trailPoints.shift();
    rebuildTrail();
  } else {
    // Trail decays when shot is done
    if (trailPoints.length > 2) {
      trailPoints.shift();
      rebuildTrail();
    }
  }

  updateBursts(dt);
  composer.render();
  requestAnimationFrame(animate);
}

// ═══════════════════════════════════════════════════════════
// INIT + EVENTS
// ═══════════════════════════════════════════════════════════

// Embedded-mode detection: when loaded with ?embedded=1, the parent page renders its
// own shot chips + info panel outside the iframe. Hide the internal shot-bar/cam-hint
// so nothing overlays the 3D canvas.
(function(){
  const params = new URLSearchParams(location.search);
  if (params.get('embedded') === '1') document.body.classList.add('embedded');
})();

// Parent-page shot selection + pause control. The landing page can dispatch:
//   { type:'4dp:select-shot', key: 'drive'|'defend'|'drop'|'dink' }
//   { type:'4dp:toggle-pause' }  — so SPACE works even when iframe isn't focused
window.addEventListener('message', (e) => {
  if (!e.data) return;
  if (e.data.type === '4dp:select-shot') {
    const key = e.data.key;
    if (key && SHOTS[key]) {
      if (paused) setPaused(false);  // un-pause when user picks a new shot
      startShot(key);
    }
  } else if (e.data.type === '4dp:toggle-pause') {
    setPaused(!paused);
  }
});

document.querySelectorAll('.shot-chip').forEach(chip => {
  chip.addEventListener('click', () => startShot(chip.dataset.shot));
});
document.getElementById('btn-camera').addEventListener('click', () => {
  // Cycle through view-for-skill presets even within the same shot
  camPresetIdx = (camPresetIdx + 1) % 3;
  const s = SHOTS[activeShotKey];
  const presets = [
    { pos: s.cam.pos, look: s.cam.look },                          // skill-view (default)
    { pos: [0, 34, 0.1], look: [0, 0, 0] },                        // top-down
    { pos: [0, 5.5, 28], look: [0, 3, 0] }                         // receiver POV
  ];
  animateCameraTo(presets[camPresetIdx].pos, presets[camPresetIdx].look, 0.8);
});
document.getElementById('btn-slowmo').addEventListener('click', () => {
  slowMo = !slowMo;
  document.getElementById('btn-slowmo').classList.toggle('active', slowMo);
  document.getElementById('slowmo-badge').classList.toggle('on', slowMo);
});

// ── PAUSE: button + SPACE key ──
function setPaused(next) {
  paused = next;
  document.getElementById('btn-pause').classList.toggle('active', paused);
  document.getElementById('btn-pause').textContent = paused ? 'Play' : 'Pause';
  document.getElementById('pause-badge').classList.toggle('on', paused);
}
document.getElementById('btn-pause').addEventListener('click', () => setPaused(!paused));
window.addEventListener('keydown', (e) => {
  // Space toggles pause. preventDefault to avoid page scroll.
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    setPaused(!paused);
  }
});

document.getElementById('btn-replay').addEventListener('click', () => {
  if (paused) setPaused(false);  // replaying = un-pause
  startShot(activeShotKey);
});

// Hide cam hint after first interaction
['click', 'wheel', 'pointerdown'].forEach(ev =>
  window.addEventListener(ev, () => {
    document.getElementById('cam-hint').classList.add('hidden');
    document.getElementById('center-hero').classList.add('dimmed');
  }, { once: true })
);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = vp.clientWidth / vp.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(vp.clientWidth, vp.clientHeight);
  composer.setSize(vp.clientWidth, vp.clientHeight);
  bloom.setSize(vp.clientWidth, vp.clientHeight);
});

// Fade loading screen. On FIRST load only, hold the scene still for ~1s so the
// viewer can read the court + player positions before the ball starts flying.
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading').classList.add('gone');
    // Stage the scene so everything is painted in "ready" state:
    // players at F0, ball at serve origin, camera at shot preset, dim color set.
    startShot('drive');
    // Then silently freeze ball motion for 1s. Camera still auto-rotates and
    // user can orbit. After 1s, unfreeze and reset shotStart so rally plays cleanly.
    shotRunning = false;
    animate();
    setTimeout(() => {
      shotT = 0;
      shotStart = performance.now();
      shotBurstFired = false;
      shotRunning = true;
    }, 1000);
  }, 300);
});
</script>

</body>
</html>
