<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ── PRESSURE DINKING DATA ──
const PD_SEGMENTS = [
  {
    id:1, title:"Intro & Pro Demo", time:"0:00–0:15", duration:900,
    cues:["Pressure dinking is often the biggest improvement area for advanced players","This is POINT CONSTRUCTION","Watch: I only speed up when there is an obvious window","What did you notice about where I was placing the ball?"],
    intro:["The title of this class is Pressure Dinking: the foundation of creating offense in the kitchen.","When I assess an advanced player and I don't see anything obvious they need to fix — they appear to have an all-around very strong game — pressure dinking is often the area where they have the biggest room for improvement.","A common question I get: I don't really know what I'm supposed to do — where am I supposed to dink, how do I improve my dinking?","This class could have been titled: go from winning 55% of your kitchen points to winning 85% of them."],
    demos:["Pro Demo #1: Hit target spots — cone #1 (cross-court) and cone #2 (middle). Show precision and consistency.","Pro Demo #2: 2v1 skinny court. Pro takes one side, two students on the other. Long-point-style rallies — only speed up on obvious windows."],
    courtType:"demo", mistakes:[]
  },
  {
    id:2, title:"How DEEP Should Your Dinks Be?", time:"0:15–0:20", duration:300,
    cues:["Test deep dinking early in the match — see how they respond","The out-of-the-air speedup is one of the most advanced shots in pickleball","Depth is relative to your opponent's ability"],
    questions:["Do dinks have to land in the kitchen?","If your opponent hits your dink out of the air, does that mean it was a bad dink?","If your opponent takes your dink out of the air and speeds it up, does that mean it was a bad dink?"],
    scenarios:[
      {label:"Scenario A",setup:"Your opponent has really bad speedups and you have super fast hands — you have no trouble handling whenever they speed it up.",answer:"Dink very deep aggressively. That puts more pressure on them to speed up their least favorite shot, giving you the upper hand in dinking."},
      {label:"Scenario B",setup:"Your opponent is all-around solid, same skill level — coinflip odds.",answer:"If you dink it and they speed it up with a 60% probability advantage, your dink was too deep. If you dink it and they can speed it up but you'll win 51% of those exchanges at that ball height, that's right up against the line — that's a good dink."},
      {label:"Scenario C",setup:"Your opponent is not a good dinker compared to you, but has super good speedups whenever you hit even slightly high.",answer:"Dink dink dink dink. Keep dinking until you get a high easy popup. Any questionable ball, do NOT speed it up — hit another dink."}
    ],
    keyInsight:"Just like testing if someone can handle a third shot drive at the start of a match, it is good to dink deep at the start of the match to test to see if someone has a good speedup. Do they even speed it up when you dink deep? Do they volley dink at all? Or do they just back up?",
    courtType:"none", mistakes:[]
  },
  {
    id:3, title:"Cone #1 — Cross-Court", time:"0:20–0:40", duration:1200,
    cues:["DEPTH is the key","Simplify your technique for better consistency","Tip down, no wrist cock, no spin — more like reset technique","From the shoulder, not the wrist","Option: try choking up on the grip for better control","Can you hit the cone consistently? If not, we need to simplify your technique"],
    drillFlow:["Backhand focus — hit cone #1 from backhand side, 100+ balls","Forehand focus — switch sides, hit cone #1 from forehand","Feeder variation 1: feed so ball bounces in front of dinker (off the bounce)","Feeder variation 2: feed balls dinker has to take out of the air (volley)"],
    courtType:"cone1",
    mistakes:["Complex wrist motion (should be simple shoulder movement)","Adding spin when trying to be precise","Not getting under the ball","Inconsistent contact point"]
  },
  {
    id:4, title:"Cone #2 — Middle", time:"0:40–0:55", duration:900,
    cues:["Cone #2 = center, 1 foot beyond kitchen line","Shorter dinks require even simpler technique","Under the ball is CRITICAL for short dinks","This is where simplified technique really pays off"],
    funQuestion:"Did simplifying your technique make it easier to hit the dots?",
    drillFlow:["Two dinkers on opposite sides, both targeting center cone","Same rotation: 4 stations, go around","Focus on tighter, more controlled motion for shorter targets"],
    courtType:"cone2",
    mistakes:["Overcomplicating motion for short targets","Too much wrist on short dinks","Not adjusting arc for shorter distance"]
  },
  {
    id:5, title:"Combined Cones #1 + #2", time:"0:55–1:10", duration:900,
    cues:["Make your opponents MOVE — top rule of dinking","Target VERY SPECIFIC SPOTS to exploit weaknesses","Not just targeting a specific player — target forehand, backhand, inside left foot, whatever","The ability to dink the ball wherever you want — that is the skill","Alternating targets trains deception — can they read where you are going?"],
    drillFlow:["First variation: off the bounce","Second variation: out of the air","Add third cone: straight down the line dink","Feeding is difficult — drill could be set up so only pros are feeding"],
    courtType:"combined",
    mistakes:["Telegraphing target location","Losing technique when alternating between targets","Not moving the feeder enough"]
  },
  {
    id:6, title:"Volley Dinking + Strategy", time:"1:10–1:25", duration:900,
    cues:["Take the ball out of the air to take time away and create angles","As you develop, your dinks go closer to the top of the net","Pressure dinking technique is a halfway partial pressure shot","Unlike resets, a variety of different techniques can work in pressure dinking","Previous skills: 2nd base (blocking), 3rd base (resets). Then pressure dinking completes the trifecta"],
    volleyDrill:["Hit unattackable under-the-ball volley dinks to each other's paddles (cooperative)","Then: volley dink to the target spots (cones)","Key: when leaning in for volley dinking, get under the ball MORE because you are closer to the net"],
    strategyPoints:["Reaching to take ball out of the air (take time away, create angles)","Hitting specific spots","Depth control — NOT just hitting every ball in the kitchen","Altering arc based on position on the court","Deception — opponent cannot read where the ball is going","Net clearance getting lower as rallies develop"],
    approaches:{
      rollDice:{name:"Roll the Dice",desc:"Speed up early",risk:"High risk",good:"opponent cannot defend speedups, OR you cannot out-dink them"},
      pressure:{name:"Pressure Dinking",desc:"Build advantage gradually",risk:"Low risk",good:"you want to win without taking risk"}
    },
    courtType:"volley", mistakes:[]
  },
  {
    id:7, title:"Live Play & Debrief", time:"1:25–1:30", duration:300,
    cues:["Test what you learned today in your next open play","Start every match by testing deep dinks to various spots","The goal: become someone opponents DREAD dinking against"],
    debrief:["Did simplifying your technique make it easier to hit the dots?","Do you need to spin your dinks for good pressure dinking?","If you do grip switching (choke up vs not), which grip should you use for dinking and why?","What happens if you just keep dinking forever until your opponent just gives you the point?"],
    funEnding:"When/why might you roll the dice with an early speedup vs lower-risk pressure dinking point construction?",
    courtType:"none", mistakes:[]
  }
];

const PD_KEY_CONCEPTS = [
  "POINT CONSTRUCTION — pressure dinking builds advantages gradually to create attack windows OR force errors",
  "Two approaches: \"Roll the dice\" (speed up early, high risk) vs. pressure dinking (build advantage, low risk)",
  "Make opponents MOVE — top rule of dinking",
  "DEPTH is the key variable — how deep depends on the opponent",
  "Volley dinking — taking ball out of the air to take time away and create angles",
  "Deception — opponent cannot read where you are hitting until last second",
  "As skill develops, dinks go closer to the top of the net",
  "Simplify technique: tip down, no wrist cock, from the shoulder",
  "Unlike resets, a variety of techniques can work in pressure dinking",
  "Prerequisites: blocking (2nd base), resets (3rd base) — then pressure dinking completes the trifecta"
];

// ── COURT SVG ──
function PDCourt({type="demo",animating=false,speed=1}){
  const [frame,setFrame] = useState(0);
  const reqRef = useRef();
  const lastTime = useRef(0);

  useEffect(()=>{
    if(!animating) return;
    const step=(ts)=>{
      if(ts-lastTime.current>50/speed){
        setFrame(f=>f+1);
        lastTime.current=ts;
      }
      reqRef.current=requestAnimationFrame(step);
    };
    reqRef.current=requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(reqRef.current);
  },[animating,speed]);

  const netY=220, kitchenFar=150, kitchenNear=290;
  const centerX=100;
  const ballPhase = animating ? (frame%120) : 0;
  let players=[], ball=null, cones=[], trajectory=[];

  if(type==="demo"){
    players=[{x:50,y:kitchenNear-10,label:"PRO",color:"#FBBF24"},{x:140,y:kitchenNear-10,label:"S1",color:"#2B8BFC"},{x:160,y:kitchenNear-20,label:"S2",color:"#2B8BFC"}];
    const t=ballPhase/120;
    const goingRight=Math.floor(frame/120)%2===0;
    ball=goingRight?{x:50+90*t,y:kitchenNear-10-40*Math.sin(Math.PI*t)}:{x:140-90*t,y:kitchenNear-10-40*Math.sin(Math.PI*t)};
    cones=[{x:90,y:kitchenFar+15,label:"#1"},{x:100,y:kitchenFar+25,label:"#2"}];
  } else if(type==="cone1"){
    players=[{x:60,y:kitchenNear-10,label:"DK",color:"#2B8BFC"},{x:160,y:kitchenFar+30,label:"FD",color:"#2B8BFC",small:true}];
    cones=[{x:155,y:kitchenFar+10,label:"#1"}];
    const t=ballPhase/120;
    ball={x:60+95*t,y:kitchenNear-10-(kitchenNear-kitchenFar-20)*t-30*Math.sin(Math.PI*t)};
    trajectory=[{x1:60,y1:kitchenNear-10,x2:155,y2:kitchenFar+10}];
  } else if(type==="cone2"){
    players=[{x:60,y:kitchenNear-10,label:"DK",color:"#2B8BFC"},{x:140,y:kitchenNear-10,label:"DK",color:"#2B8BFC"}];
    cones=[{x:100,y:kitchenFar+25,label:"#2"}];
    const t=ballPhase/120;
    const side=Math.floor(frame/120)%2;
    ball=side===0?{x:60+40*t,y:kitchenNear-10-(kitchenNear-kitchenFar)*t-20*Math.sin(Math.PI*t)}:{x:140-40*t,y:kitchenNear-10-(kitchenNear-kitchenFar)*t-20*Math.sin(Math.PI*t)};
  } else if(type==="combined"){
    players=[{x:60,y:kitchenNear-10,label:"DK",color:"#2B8BFC"},{x:150,y:kitchenFar+30,label:"FD",color:"#2B8BFC",small:true}];
    cones=[{x:155,y:kitchenFar+10,label:"#1"},{x:100,y:kitchenFar+25,label:"#2"},{x:40,y:kitchenFar+10,label:"#3"}];
    const cycle=Math.floor(frame/120)%3;
    const t=ballPhase/120;
    const targets=[{x:155,y:kitchenFar+10},{x:100,y:kitchenFar+25},{x:40,y:kitchenFar+10}];
    const tgt=targets[cycle];
    ball={x:60+(tgt.x-60)*t,y:kitchenNear-10+(tgt.y-kitchenNear+10)*t-30*Math.sin(Math.PI*t)};
  } else if(type==="volley"){
    players=[{x:70,y:kitchenNear-20,label:"P1",color:"#2B8BFC"},{x:130,y:kitchenFar+20,label:"P2",color:"#2B8BFC"}];
    cones=[{x:155,y:kitchenFar+10,label:"#1"},{x:100,y:kitchenFar+25,label:"#2"}];
    const t=ballPhase/120;
    const goingUp=Math.floor(frame/120)%2===0;
    ball=goingUp?{x:70+60*t,y:kitchenNear-20-(kitchenNear-kitchenFar-40)*t-15*Math.sin(Math.PI*t)}:{x:130-60*t,y:kitchenFar+20+(kitchenNear-kitchenFar-40)*t-15*Math.sin(Math.PI*t)};
  }

  return (
    <svg viewBox="0 0 200 440" style={{width:"100%",maxWidth:360,margin:"0 auto",display:"block",borderRadius:12,overflow:"hidden"}}>
      <rect x="0" y="0" width="200" height="440" fill="#1759B0" rx="4"/>
      <rect x="0" y={kitchenFar} width="200" height={kitchenNear-kitchenFar} fill="#1E6FD9" opacity=".4"/>
      <line x1="0" y1={netY} x2="200" y2={netY} stroke="#fff" strokeWidth="2.5"/>
      <line x1="0" y1={kitchenFar} x2="200" y2={kitchenFar} stroke="#fff" strokeWidth="1.2" strokeDasharray="6 3"/>
      <line x1="0" y1={kitchenNear} x2="200" y2={kitchenNear} stroke="#fff" strokeWidth="1.2" strokeDasharray="6 3"/>
      <line x1={centerX} y1="0" x2={centerX} y2={kitchenFar} stroke="#fff" strokeWidth=".8" opacity=".5"/>
      <line x1={centerX} y1={kitchenNear} x2={centerX} y2="440" stroke="#fff" strokeWidth=".8" opacity=".5"/>
      <rect x="0" y="0" width="200" height="440" fill="none" stroke="#fff" strokeWidth="1.5" rx="4"/>
      <text x={centerX} y={netY-6} textAnchor="middle" fill="#fff" fontSize="8" fontWeight="700" opacity=".4">NET</text>
      <text x={10} y={kitchenFar+12} fill="#fff" fontSize="7" fontWeight="600" opacity=".3">NVZ</text>
      <text x={10} y={kitchenNear-5} fill="#fff" fontSize="7" fontWeight="600" opacity=".3">NVZ</text>
      {trajectory.map((t,i)=>(
        <line key={i} x1={t.x1} y1={t.y1} x2={t.x2} y2={t.y2} stroke="#c8e632" strokeWidth="1" strokeDasharray="4 4" opacity=".4"/>
      ))}
      {cones.map((c,i)=>(
        <g key={i}>
          <polygon points={`${c.x},${c.y-8} ${c.x-6},${c.y+4} ${c.x+6},${c.y+4}`} fill="#FF6B35" opacity=".9"/>
          <text x={c.x} y={c.y+14} textAnchor="middle" fill="#FF6B35" fontSize="8" fontWeight="800">{c.label}</text>
        </g>
      ))}
      {players.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={p.small?7:10} fill={p.color} stroke="#fff" strokeWidth="1.5" opacity=".9"/>
          <text x={p.x} y={p.y+3.5} textAnchor="middle" fill="#fff" fontSize={p.small?6:7} fontWeight="800">{p.label}</text>
        </g>
      ))}
      {ball && animating && (
        <g>
          <circle cx={ball.x} cy={ball.y} r="5" fill="#c8e632" stroke="#a0b828" strokeWidth="1"/>
          <circle cx={ball.x} cy={ball.y} r="8" fill="#c8e632" opacity=".2"/>
        </g>
      )}
    </svg>
  );
}

function pdFormatTime(s){const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec.toString().padStart(2,'0')}`;}

// ── PRO VIEW ──
function PDProView(){
  const [activeSegment,setActiveSegment]=useState(0);
  const [totalElapsed,setTotalElapsed]=useState(0);
  const [segmentElapsed,setSegmentElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const [animating,setAnimating]=useState(false);
  const [speed,setSpeed]=useState(1);
  const [expandedScenario,setExpandedScenario]=useState(null);
  const intervalRef=useRef(null);
  const seg=PD_SEGMENTS[activeSegment];
  const totalDuration=5400;

  useEffect(()=>{
    if(running){intervalRef.current=setInterval(()=>{setTotalElapsed(t=>t+1);setSegmentElapsed(s=>s+1)},1000)}
    else{clearInterval(intervalRef.current)}
    return ()=>clearInterval(intervalRef.current);
  },[running]);

  const jumpToSegment=(i)=>{setActiveSegment(i);setSegmentElapsed(0);setExpandedScenario(null)};
  const segPct=Math.min(100,segmentElapsed/seg.duration*100);
  const totalPct=Math.min(100,totalElapsed/totalDuration*100);
  const isOvertime=segmentElapsed>seg.duration;

  const card={background:"rgba(255,255,255,.04)",borderRadius:16,padding:"24px",border:"1px solid rgba(255,255,255,.08)",marginBottom:16};
  const label={fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:10};
  const blue="#2B8BFC",green="#34D399",gold="#FBBF24",red="#FB7185";

  return (
    <div style={{maxWidth:900,margin:"0 auto",padding:"20px 0 80px"}}>
      <div style={{...card,padding:"20px 24px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{...label,color:"rgba(255,255,255,.3)",marginBottom:4}}>Class Timer</div>
            <div style={{fontSize:36,fontWeight:900,letterSpacing:-1.5,color:totalElapsed>totalDuration?red:"#fff"}}>{pdFormatTime(totalElapsed)} <span style={{fontSize:16,color:"rgba(255,255,255,.3)",fontWeight:500}}>/ 90:00</span></div>
          </div>
          <button onClick={()=>setRunning(!running)} style={{padding:"12px 24px",borderRadius:12,border:"none",fontSize:15,fontWeight:700,background:running?"rgba(255,255,255,.08)":blue,color:"#fff",minWidth:80,cursor:"pointer"}}>{running?"Pause":"Start"}</button>
        </div>
        <div style={{height:6,background:"rgba(255,255,255,.06)",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",background:blue,borderRadius:3,width:`${totalPct}%`,transition:"width 1s linear"}}/>
        </div>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        {PD_SEGMENTS.map((s,i)=>(
          <button key={i} onClick={()=>jumpToSegment(i)} style={{
            padding:"10px 14px",borderRadius:10,border:i===activeSegment?`2px solid ${blue}`:"1px solid rgba(255,255,255,.08)",
            background:i===activeSegment?"rgba(43,139,252,.12)":"rgba(255,255,255,.03)",
            color:i===activeSegment?blue:"rgba(255,255,255,.4)",
            fontSize:12,fontWeight:700,whiteSpace:"nowrap",flexShrink:0,minWidth:44,cursor:"pointer"
          }}>{i+1}</button>
        ))}
      </div>

      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:blue,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Segment {seg.id} of 7</div>
            <h2 style={{fontSize:24,fontWeight:900,letterSpacing:-.5}}>{seg.title}</h2>
            <div style={{fontSize:13,color:"rgba(255,255,255,.3)",marginTop:4}}>{seg.time}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:28,fontWeight:800,color:isOvertime?red:"#fff",fontVariantNumeric:"tabular-nums"}}>{pdFormatTime(segmentElapsed)}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>/ {pdFormatTime(seg.duration)}</div>
          </div>
        </div>
        <div style={{height:4,background:"rgba(255,255,255,.06)",borderRadius:2,overflow:"hidden",marginBottom:20}}>
          <div style={{height:"100%",background:isOvertime?red:blue,borderRadius:2,width:`${Math.min(segPct,100)}%`,transition:"width 1s linear"}}/>
        </div>

        {seg.intro && (
          <div style={{marginBottom:20}}>
            <div style={{...label,color:"rgba(255,255,255,.3)"}}>Say This</div>
            {seg.intro.map((s,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,.02)",borderRadius:12,padding:"14px 16px",marginBottom:8,fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.7,borderLeft:`3px solid ${blue}`}}>"{s}"</div>
            ))}
          </div>
        )}

        {seg.demos && (
          <div style={{marginBottom:20}}>
            <div style={{...label,color:gold}}>Demonstrations</div>
            {seg.demos.map((d,i)=>(
              <div key={i} style={{background:"rgba(251,191,36,.04)",border:"1px solid rgba(251,191,36,.12)",borderRadius:12,padding:"14px 16px",marginBottom:8,fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.6}}>{d}</div>
            ))}
          </div>
        )}

        {seg.questions && (
          <div style={{marginBottom:20}}>
            <div style={{...label,color:blue}}>Ask the Group</div>
            {seg.questions.map((q,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,.02)",borderRadius:12,padding:"14px 16px",marginBottom:8,fontSize:15,fontWeight:600,color:"#fff"}}>"{q}"</div>
            ))}
          </div>
        )}

        {seg.scenarios && (
          <div style={{marginBottom:20}}>
            <div style={{...label,color:green}}>Scenarios — Tap to Reveal</div>
            {seg.scenarios.map((sc,i)=>(
              <div key={i} onClick={()=>setExpandedScenario(expandedScenario===i?null:i)} style={{
                background:expandedScenario===i?"rgba(52,211,153,.04)":"rgba(255,255,255,.02)",
                border:expandedScenario===i?"1px solid rgba(52,211,153,.15)":"1px solid rgba(255,255,255,.06)",
                borderRadius:14,padding:"16px 18px",marginBottom:10,cursor:"pointer",transition:"all .2s"
              }}>
                <div style={{fontSize:13,fontWeight:700,color:green,marginBottom:6}}>{sc.label}</div>
                <div style={{fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.6}}>{sc.setup}</div>
                {expandedScenario===i && (
                  <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(52,211,153,.12)",fontSize:14,color:green,lineHeight:1.7,fontWeight:500}}>→ {sc.answer}</div>
                )}
              </div>
            ))}
          </div>
        )}

        {seg.keyInsight && (
          <div style={{background:"rgba(251,191,36,.04)",border:"1px solid rgba(251,191,36,.12)",borderRadius:14,padding:"16px 18px",marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:gold,marginBottom:6}}>Key Insight</div>
            <div style={{fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.7}}>{seg.keyInsight}</div>
          </div>
        )}

        {seg.drillFlow && (
          <div style={{marginBottom:20}}>
            <div style={{...label,color:blue}}>Drill Flow</div>
            {seg.drillFlow.map((d,i)=>(
              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
                <div style={{width:24,height:24,borderRadius:7,background:"rgba(43,139,252,.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:blue,flexShrink:0}}>{i+1}</div>
                <div style={{fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.6,paddingTop:2}}>{d}</div>
              </div>
            ))}
          </div>
        )}

        {seg.volleyDrill && (
          <div style={{marginBottom:20}}>
            <div style={{...label,color:blue}}>Volley Dinking Drill</div>
            {seg.volleyDrill.map((d,i)=>(
              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
                <div style={{width:24,height:24,borderRadius:7,background:"rgba(43,139,252,.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:blue,flexShrink:0}}>{i+1}</div>
                <div style={{fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.6,paddingTop:2}}>{d}</div>
              </div>
            ))}
          </div>
        )}

        {seg.strategyPoints && (
          <div style={{marginBottom:20}}>
            <div style={{...label,color:gold}}>What Pro Demonstrates (spectators guess)</div>
            {seg.strategyPoints.map((s,i)=>(
              <div key={i} style={{fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.8,paddingLeft:16,position:"relative"}}>
                <span style={{position:"absolute",left:0,color:gold}}>•</span>{s}
              </div>
            ))}
          </div>
        )}

        {seg.approaches && (
          <div style={{marginBottom:20}}>
            <div style={{...label,color:"rgba(255,255,255,.3)"}}>Two Approaches to Kitchen Offense</div>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1,background:"rgba(251,113,133,.04)",border:"1px solid rgba(251,113,133,.12)",borderRadius:14,padding:16}}>
                <div style={{fontSize:14,fontWeight:800,color:red,marginBottom:6}}>{seg.approaches.rollDice.name}</div>
                <div style={{fontSize:13,color:"rgba(255,255,255,.6)",lineHeight:1.6}}>{seg.approaches.rollDice.desc}</div>
                <div style={{fontSize:11,color:red,marginTop:8,fontWeight:600}}>{seg.approaches.rollDice.risk}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,.35)",marginTop:4}}>Good when: {seg.approaches.rollDice.good}</div>
              </div>
              <div style={{flex:1,background:"rgba(52,211,153,.04)",border:"1px solid rgba(52,211,153,.12)",borderRadius:14,padding:16}}>
                <div style={{fontSize:14,fontWeight:800,color:green,marginBottom:6}}>{seg.approaches.pressure.name}</div>
                <div style={{fontSize:13,color:"rgba(255,255,255,.6)",lineHeight:1.6}}>{seg.approaches.pressure.desc}</div>
                <div style={{fontSize:11,color:green,marginTop:8,fontWeight:600}}>{seg.approaches.pressure.risk}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,.35)",marginTop:4}}>Good when: {seg.approaches.pressure.good}</div>
              </div>
            </div>
          </div>
        )}

        {seg.debrief && (
          <div style={{marginBottom:20}}>
            <div style={{...label,color:blue}}>Debrief Questions</div>
            {seg.debrief.map((q,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,.02)",borderRadius:12,padding:"14px 16px",marginBottom:8,fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.6}}>"{q}"</div>
            ))}
          </div>
        )}

        {seg.funQuestion && (
          <div style={{background:"rgba(251,191,36,.04)",border:"1px solid rgba(251,191,36,.12)",borderRadius:14,padding:"14px 18px",marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:gold,marginBottom:4}}>Fun Question</div>
            <div style={{fontSize:15,fontWeight:600,color:"#fff"}}>"{seg.funQuestion}"</div>
          </div>
        )}

        {seg.funEnding && (
          <div style={{background:"rgba(251,191,36,.04)",border:"1px solid rgba(251,191,36,.12)",borderRadius:14,padding:"14px 18px",marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:gold,marginBottom:4}}>Ending Question</div>
            <div style={{fontSize:15,fontWeight:600,color:"#fff"}}>"{seg.funEnding}"</div>
          </div>
        )}

        {seg.courtType!=="none" && (
          <div style={{marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{...label,color:"rgba(255,255,255,.3)",marginBottom:0}}>Court Diagram</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setAnimating(!animating)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,.08)",background:animating?blue:"rgba(255,255,255,.06)",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                  {animating?"⏸ Pause":"▶ Play"}
                </button>
                {[0.5,1,2].map(s=>(
                  <button key={s} onClick={()=>setSpeed(s)} style={{padding:"6px 10px",borderRadius:8,border:speed===s?`1px solid ${blue}`:"1px solid rgba(255,255,255,.08)",background:speed===s?"rgba(43,139,252,.12)":"transparent",color:speed===s?blue:"rgba(255,255,255,.3)",fontSize:11,fontWeight:700,cursor:"pointer"}}>{s}x</button>
                ))}
              </div>
            </div>
            <PDCourt type={seg.courtType} animating={animating} speed={speed}/>
          </div>
        )}

        <div style={{marginBottom:20}}>
          <div style={{...label,color:blue}}>Teaching Cues</div>
          {seg.cues.map((c,i)=>(
            <div key={i} style={{fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.8,paddingLeft:16,position:"relative"}}>
              <span style={{position:"absolute",left:0,color:blue}}>→</span>{c}
            </div>
          ))}
        </div>

        {seg.mistakes.length>0 && (
          <div>
            <div style={{...label,color:red}}>Watch For</div>
            {seg.mistakes.map((m,i)=>(
              <div key={i} style={{fontSize:14,color:red,lineHeight:1.8,paddingLeft:16,position:"relative",opacity:.8}}>
                <span style={{position:"absolute",left:0}}>⚠</span>{m}
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{background:"rgba(251,191,36,.06)",border:"2px solid rgba(251,191,36,.25)",borderRadius:14,padding:"16px 20px",textAlign:"center"}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:gold,marginBottom:6}}>Feeder Rule</div>
        <div style={{fontSize:16,fontWeight:700,color:gold}}>"Feeders: always practice and reset. No wrist cock dink."</div>
      </div>

      <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:20}}>
        <button disabled={activeSegment===0} onClick={()=>jumpToSegment(activeSegment-1)} style={{
          padding:"14px 28px",borderRadius:12,border:"1px solid rgba(255,255,255,.08)",background:"rgba(255,255,255,.04)",color:activeSegment===0?"rgba(255,255,255,.1)":"#fff",fontSize:15,fontWeight:700,opacity:activeSegment===0?.4:1,cursor:"pointer"
        }}>← Previous</button>
        <button disabled={activeSegment===6} onClick={()=>jumpToSegment(activeSegment+1)} style={{
          padding:"14px 28px",borderRadius:12,border:"none",background:activeSegment===6?"rgba(255,255,255,.06)":blue,color:"#fff",fontSize:15,fontWeight:700,opacity:activeSegment===6?.4:1,cursor:"pointer"
        }}>Next →</button>
      </div>
    </div>
  );
}

// ── STUDENT VIEW ──
function PDStudentView(){
  const [expandedDrill,setExpandedDrill]=useState(null);
  const [animatingDrill,setAnimatingDrill]=useState(null);
  const blue="#2B8BFC",green="#34D399",gold="#FBBF24";

  const drills=[
    {name:"Cone #1 — Cross-Court",purpose:"Build cross-court precision. Target the T at the kitchen endline.",how:"Place a cone at the cross-court T. Hit 100+ dinks from backhand, then forehand. Have a feeder return balls — practice both off the bounce and out of the air.",courtType:"cone1"},
    {name:"Cone #2 — Middle",purpose:"Develop short, controlled middle dinks to the center of the court.",how:"Place a cone at center, 1 foot beyond kitchen line. Two players on opposite sides target the cone. Focus on simplified technique — shoulder, not wrist.",courtType:"cone2"},
    {name:"Combined Cones",purpose:"Train target-switching and movement creation.",how:"Both cones in play. Alternate: cone #1 (cross-court), then cone #2 (middle), then add cone #3 (down the line). This trains deception and forces opponent movement.",courtType:"combined"},
    {name:"Volley Dinking",purpose:"Take time away from opponents by dinking out of the air.",how:"Start cooperative — volley dink to each other's paddles. Then target the cones while volley dinking. Key: get under the ball MORE when leaning in.",courtType:"volley"},
  ];

  return (
    <div style={{maxWidth:700,margin:"0 auto",padding:"20px 0 80px"}}>
      <div style={{background:"rgba(255,255,255,.04)",borderRadius:16,padding:"28px 24px",marginBottom:20,border:"1px solid rgba(255,255,255,.08)"}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:blue,marginBottom:12}}>◆ Class Overview</div>
        <h1 style={{fontSize:28,fontWeight:900,letterSpacing:-.5,marginBottom:12,lineHeight:1.2}}>Pressure Dinking</h1>
        <p style={{fontSize:15,color:"rgba(255,255,255,.4)",lineHeight:1.7,marginBottom:16}}>The foundation of creating offense in the kitchen. Go from winning 55% of your kitchen points to winning 85% of them.</p>
        <p style={{fontSize:14,color:"rgba(255,255,255,.3)",lineHeight:1.7}}>Pressure dinking builds advantages gradually to create attack windows OR force errors — missed dinks wide, into the net, or easy popups. The drills are extremely simple. You have to master executing them.</p>
      </div>

      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"rgba(255,255,255,.3)",marginBottom:12}}>Key Concepts</div>
        {PD_KEY_CONCEPTS.map((c,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:"14px 16px",marginBottom:8,fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.6,border:"1px solid rgba(255,255,255,.06)"}}>
            <span style={{color:blue,fontWeight:700,marginRight:8}}>{i+1}.</span>{c}
          </div>
        ))}
      </div>

      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"rgba(255,255,255,.3)",marginBottom:12}}>Drill Library</div>
        {drills.map((d,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,.04)",borderRadius:16,padding:"20px",marginBottom:12,border:expandedDrill===i?`1px solid ${blue}`:"1px solid rgba(255,255,255,.06)",cursor:"pointer",transition:"all .2s"}} onClick={()=>{setExpandedDrill(expandedDrill===i?null:i);setAnimatingDrill(null)}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <h3 style={{fontSize:17,fontWeight:800}}>{d.name}</h3>
              <span style={{color:"rgba(255,255,255,.3)",fontSize:18}}>{expandedDrill===i?"−":"+"}</span>
            </div>
            <p style={{fontSize:13,color:"rgba(255,255,255,.4)",marginTop:4}}>{d.purpose}</p>
            {expandedDrill===i && (
              <div style={{marginTop:16}}>
                <div style={{marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"rgba(255,255,255,.3)"}}>Court View</div>
                    <button onClick={(e)=>{e.stopPropagation();setAnimatingDrill(animatingDrill===i?null:i)}} style={{padding:"6px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,.08)",background:animatingDrill===i?blue:"rgba(255,255,255,.06)",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                      {animatingDrill===i?"⏸ Pause":"▶ Play"}
                    </button>
                  </div>
                  <PDCourt type={d.courtType} animating={animatingDrill===i} speed={1}/>
                </div>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:green,marginBottom:6}}>How to Practice</div>
                <p style={{fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.7}}>{d.how}</p>
              </div>
            )}
          </div>
        ))}
      </div>

      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"rgba(255,255,255,.3)",marginBottom:12}}>Strategy Scenarios</div>
        {PD_SEGMENTS[1].scenarios.map((sc,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,.04)",borderRadius:14,padding:"18px 20px",marginBottom:10,border:"1px solid rgba(255,255,255,.06)"}}>
            <div style={{fontSize:13,fontWeight:700,color:green,marginBottom:6}}>{sc.label}</div>
            <div style={{fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.6,marginBottom:10}}>{sc.setup}</div>
            <div style={{fontSize:14,color:green,lineHeight:1.6,fontWeight:500,paddingTop:10,borderTop:"1px solid rgba(255,255,255,.06)"}}>→ {sc.answer}</div>
          </div>
        ))}
        <div style={{background:"rgba(251,191,36,.04)",border:"1px solid rgba(251,191,36,.12)",borderRadius:14,padding:"16px 18px",marginTop:10}}>
          <div style={{fontSize:11,fontWeight:700,color:gold,marginBottom:6}}>Key Insight</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.7}}>{PD_SEGMENTS[1].keyInsight}</div>
        </div>
      </div>

      <div>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"rgba(255,255,255,.3)",marginBottom:12}}>Next Steps</div>
        {[
          {title:"Book a Pro Drilling Session",desc:"1-on-1 with your coach to lock in pressure dinking technique",color:blue},
          {title:"Find a Drill Partner",desc:"Connect with someone at your level to practice cone drills",color:green},
          {title:"Book Next Class",desc:"Level 4 Kitchen Offense — Wednesdays at 6pm",color:gold},
        ].map((n,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,.04)",borderRadius:14,padding:"18px 20px",marginBottom:10,border:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:16,cursor:"pointer"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>{n.title}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,.4)",marginTop:2}}>{n.desc}</div>
            </div>
            <div style={{color:n.color,fontSize:18}}>→</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── MAIN ──
function PressureDinkingApp(){
  const [view,setView]=useState("pro");
  const blue="#2B8BFC";

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",marginBottom:24}}>
        <div style={{display:"flex",gap:4}}>
          {[{key:"pro",label:"Pro View"},{key:"student",label:"Student View"}].map(v=>(
            <button key={v.key} onClick={()=>setView(v.key)} style={{
              padding:"8px 18px",borderRadius:10,fontSize:13,fontWeight:600,border:"none",cursor:"pointer",
              background:view===v.key?"rgba(43,139,252,.9)":"transparent",
              color:view===v.key?"#fff":"rgba(255,255,255,.5)",
              transition:"all .2s"
            }}>{v.label}</button>
          ))}
        </div>
      </div>

      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:blue,marginBottom:8}}>D4 · Dink · Kitchen Offense</div>
        <h1 style={{fontSize:"clamp(24px,4vw,40px)",fontWeight:900,letterSpacing:-1,color:"#fff"}}>Pressure Dinking</h1>
        <p style={{fontSize:14,color:"rgba(255,255,255,.4)",marginTop:8}}>The foundation of creating offense in the kitchen</p>
      </div>

      {view==="pro" ? <PDProView/> : <PDStudentView/>}
    </div>
  );
}

const pdRoot = document.getElementById('pressure-dinking-root');
if(pdRoot){ReactDOM.createRoot(pdRoot).render(<PressureDinkingApp/>)}
</script>
</body>
</html>
